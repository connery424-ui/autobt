<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTraderBot - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0, 217, 255, 0.6));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d9ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8a8a9a;
            margin-bottom: 48px;
            font-size: 16px;
        }

        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 14px;
            color: #8a8a9a;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            animation: orb 8s ease-in-out infinite;
            z-index: 0;
        }

        .glow-orb.one {
            top: -100px;
            right: -100px;
        }

        .glow-orb.two {
            bottom: -100px;
            left: -100px;
            animation-delay: -4s;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
        }

        @keyframes orb {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow-orb one"></div>
    <div class="glow-orb two"></div>

    <div class="container">
        <img src="assets/icon.png" alt="AutoTraderBot" class="logo" onerror="this.style.display='none'">
        <h1>AutoTraderBot</h1>
        <p class="subtitle">Solana Sniper Trading Bot</p>

        <div class="loader">
            <div class="spinner"></div>
            <div class="status">Starting servers...</div>
        </div>
    </div>

    <script>
        // Update status messages
        const statuses = [
            'Starting servers...',
            'Initializing backend...',
            'Loading trading engine...',
            'Connecting to Solana...',
            'Almost ready...'
        ];

        let statusIndex = 0;
        const statusEl = document.querySelector('.status');

        setInterval(() => {
            statusIndex = (statusIndex + 1) % statuses.length;
            statusEl.textContent = statuses[statusIndex];
        }, 2000);
    </script>
</body>

</html>
